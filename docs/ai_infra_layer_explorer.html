
<style>
.layer-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;overflow:hidden}
.layer-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.layer-header:hover{background:var(--color-background-secondary)}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-title{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1}
.layer-sub{font-size:12px;color:var(--color-text-secondary)}
.layer-chevron{font-size:16px;color:var(--color-text-tertiary);transition:transform .2s}
.layer-chevron.open{transform:rotate(180deg)}
.layer-body{padding:0 18px 14px;display:none}
.layer-body.open{display:block}
.layer-desc{font-size:13px;color:var(--color-text-secondary);margin:0 0 12px;line-height:1.6;padding-top:4px;border-top:0.5px solid var(--color-border-tertiary)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.mod-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer}
.mod-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-primary)}
.mod-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.mod-tag{font-size:11px;color:var(--color-text-tertiary)}
.detail-panel{margin-top:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:14px 16px;display:none}
.detail-panel.open{display:block}
.det-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.det-body{font-size:13px;color:var(--color-text-secondary);line-height:1.7}
.det-body b{color:var(--color-text-primary);font-weight:500}
.ask-btn{margin-top:10px;font-size:12px;color:var(--color-text-info);background:none;border:0.5px solid var(--color-border-info,var(--color-border-secondary));border-radius:var(--border-radius-md);padding:5px 10px;cursor:pointer}
.ask-btn:hover{background:var(--color-background-info,var(--color-background-secondary))}
</style>

<div id="app" style="padding:2px 0"></div>

<script>
const layers = [
  {
    color:"#7F77DD", label:"L1", title:"应用层",
    en:"Application Layer",
    desc:"最靠近用户的一层，负责把 LLM 能力包装成可用的产品或接口。工程师在这里写业务逻辑，调用下层的推理 API，不需要关心模型如何运行。",
    modules:[
      {name:"Inference API",tag:"对外服务接口",detail:"将模型推理能力封装为 HTTP/gRPC 接口，供外部调用。核心指标是 <b>TTFT（首 token 延迟）</b>和 <b>吞吐量（tokens/s）</b>。OpenAI 的 /v1/chat/completions 就是标准形态。",ask:"Inference API 的 TTFT 和 throughput 如何优化？"},
      {name:"RAG / Vector DB",tag:"检索增强生成",detail:"把外部知识库向量化存入 Faiss / Milvus / Qdrant，用户提问时先 <b>检索相关文档</b>，再拼入 prompt 送给模型，解决知识截止和幻觉问题。",ask:"RAG 系统的向量数据库如何选型？"},
      {name:"Agent / Tool use",tag:"自主任务执行",detail:"让模型能调用外部工具（搜索、代码执行、API）完成多步任务。核心是 <b>ReAct 循环</b>：思考 → 调用工具 → 观察结果 → 再思考。",ask:"Agent 框架的 ReAct 循环是如何工作的？"},
      {name:"Fine-tuning pipeline",tag:"微调流水线",detail:"在预训练模型基础上用特定数据做 SFT（监督微调），使模型适配垂直领域。涉及数据清洗、训练、eval 到部署的完整流程。",ask:"Fine-tuning pipeline 的完整流程是什么？"},
      {name:"Prompt engineering",tag:"提示词工程",detail:"通过设计 system prompt、few-shot 示例、CoT 引导，在不改模型权重的情况下提升输出质量。是成本最低的优化手段。",ask:"Prompt engineering 有哪些核心技巧？"},
    ]
  },
  {
    color:"#1D9E75", label:"L2", title:"推理优化层",
    en:"Inference Optimization",
    desc:"这一层是 AI Infra 最核心的战场，目标是在相同硬件上让模型跑得更快、更省显存、支持更长上下文。技术密度最高，也是面试考察重点。",
    modules:[
      {name:"Quantization",tag:"模型量化",detail:"将模型权重从 FP32/BF16 压缩为更低精度（INT8/INT4/FP8），显著减少显存占用和访存带宽。<b>INT4 是当前实践甜点</b>，精度损失可接受，压缩比达 8×。代表方案：GPTQ、AWQ、GGUF。",ask:"INT4 和 INT8 量化的精度损失对比实验怎么设计？"},
      {name:"Speculative Decoding",tag:"投机解码",detail:"用小 draft model 快速生成候选 token，再由大 target model 并行验证，减少大模型的串行调用次数。<b>小 batch 下加速明显，大 batch 下因 draft 利用率下降而收益有限</b>，这是反直觉之处。",ask:"Speculative Decoding 在大 batch 下 throughput 为何反而下降？"},
      {name:"KV Cache 压缩",tag:"缓存优化",detail:"Attention 的 Key-Value 矩阵在长上下文下占据大量显存。主流方案：<b>KV 量化（INT8/INT4）、Token eviction（H2O/SnapKV）、Prefix Caching</b>。实验表明 KV 量化比 token eviction 对精度影响更小。",ask:"KV Cache 量化和 Token eviction 的优劣对比是什么？"},
      {name:"FlashAttention",tag:"高效 Attention 算子",detail:"通过 <b>分块计算（tiling）</b>将 Attention 的中间矩阵保留在 SRAM 而非 HBM，把显存访问从 O(N²) 降为 O(N)，速度提升 2-4×。FlashAttention-3 已支持 H100 的异步张量核。",ask:"FlashAttention 的 tiling 机制是如何减少显存访问的？"},
      {name:"Continuous Batching",tag:"连续批处理",detail:"传统 static batching 要等所有请求同时完成才出发下一批，浪费 GPU 时间。Continuous batching 在每个 <b>token 生成步</b>动态插入新请求，GPU 利用率大幅提升，是 vLLM 的核心特性。",ask:"Continuous batching 和 static batching 的区别是什么？"},
      {name:"Tensor/Pipeline 并行",tag:"模型并行",detail:"<b>Tensor Parallelism（TP）</b>：把单个矩阵切分到多 GPU，通信频繁但延迟低。<b>Pipeline Parallelism（PP）</b>：按层切分，通信量小但有 bubble。长序列还有 Sequence Parallelism（SP）。",ask:"Tensor Parallelism 和 Pipeline Parallelism 如何选择？"},
      {name:"算子融合 / Kernel",tag:"CUDA 算子优化",detail:"把多个计算步骤（如 LayerNorm + Linear）合并为单个 CUDA kernel，消除中间结果的显存读写，降低 kernel launch 开销。Triton 语言让开发者更容易写自定义 kernel。",ask:"算子融合的原理和如何用 Triton 实现自定义 kernel？"},
      {name:"Pruning / Distillation",tag:"模型压缩",detail:"<b>Pruning（剪枝）</b>：移除对输出影响小的权重或整个注意力头。<b>Distillation（蒸馏）</b>：用大模型（teacher）的 logit 输出训练小模型（student），保留更多知识。",ask:"结构化剪枝和知识蒸馏的区别是什么？"},
    ]
  },
  {
    color:"#185FA5", label:"L3", title:"Serving 框架层",
    en:"Serving Framework",
    desc:"这一层提供开箱即用的 LLM 推理服务框架，把推理优化层的技术封装成可部署的系统，工程师通过配置而非从头实现来获得高性能服务。",
    modules:[
      {name:"vLLM",tag:"最流行的开源框架",detail:"UC Berkeley 出品，核心创新是 <b>PagedAttention</b>——将 KV Cache 分成固定大小的 page 管理，像操作系统管理内存一样避免碎片化，吞吐量是 HuggingFace 原版的 10-20×。",ask:"vLLM 的 PagedAttention 内存管理机制详解"},
      {name:"TensorRT-LLM",tag:"NVIDIA 官方优化",detail:"NVIDIA 出品，将模型编译为高度优化的 TensorRT 引擎，充分利用 H100 的 FP8 Tensor Core、FMHA（Fused Multi-Head Attention）等特性，在 NVIDIA 硬件上性能最优。",ask:"TensorRT-LLM 相比 vLLM 的性能差距有多大？"},
      {name:"SGLang",tag:"结构化生成",detail:"斯坦福出品，核心特性是 <b>RadixAttention</b>——对有公共前缀的请求共享 KV Cache，大幅提升 batch inference 效率。同时支持结构化输出（JSON/regex），适合 agent 场景。",ask:"SGLang 的 RadixAttention 是如何工作的？"},
      {name:"llama.cpp",tag:"CPU / 边缘部署",detail:"纯 C++ 实现，无需 CUDA，支持在 CPU、Apple Silicon、手机上运行量化模型。使用 GGUF 格式，是边缘侧和消费级硬件部署的首选方案。",ask:"llama.cpp 在 CPU 上如何做量化推理加速？"},
      {name:"Triton Inference Server",tag:"生产级部署",detail:"NVIDIA 出品的模型服务中间件，支持 gRPC/HTTP 协议、多模型并发、动态 batching、A/B 测试。常与 TensorRT-LLM 配合用于大规模生产部署。",ask:"Triton Inference Server 的 dynamic batching 如何配置？"},
    ]
  },
  {
    color:"#D85A30", label:"L4", title:"训练 & MLOps 层",
    en:"Training & MLOps",
    desc:"覆盖模型从数据到训练到上线的全生命周期管理。对于推理岗而言，这一层需要了解原理但不需要深度实现，重点是理解模型从哪里来、怎么评估。",
    modules:[
      {name:"Megatron-LM",tag:"大规模预训练",detail:"NVIDIA 出品，实现了完整的 <b>3D 并行（TP+PP+DP）</b>，是训练千亿参数模型的工业标准。GPT-3、LLaMA 系列的预训练大多基于此框架或其变体。",ask:"Megatron-LM 的 3D 并行策略是怎么配置的？"},
      {name:"DeepSpeed",tag:"ZeRO 显存优化",detail:"微软出品，核心是 <b>ZeRO（Zero Redundancy Optimizer）</b>：将优化器状态、梯度、参数分片到多 GPU，ZeRO-3 可以让单 GPU 只保存 1/N 的模型参数，大幅扩展可训练模型规模。",ask:"ZeRO-1/2/3 的区别和各自适用场景？"},
      {name:"PyTorch FSDP",tag:"全分片数据并行",detail:"PyTorch 原生的分布式训练方案，类似 ZeRO-3，将模型参数全分片。相比 DeepSpeed 更易与 PyTorch 生态集成，Llama 官方训练代码使用此方案。",ask:"FSDP 和 DeepSpeed ZeRO 如何选择？"},
      {name:"RLHF / GRPO",tag:"对齐训练",detail:"<b>RLHF</b>：用人类偏好数据训练 Reward Model，再用 PPO 算法优化策略模型。<b>GRPO</b>（DeepSeek 提出）：去掉 value model，用 group 采样的相对奖励直接优化，更节省显存。",ask:"GRPO 相比 PPO 在显存和稳定性上有哪些优势？"},
      {name:"W&B / MLflow",tag:"实验追踪",detail:"训练过程中记录 loss、learning rate、评估指标，便于对比实验和复现结果。W&B 界面更友好，MLflow 更易自托管。是每个 ML 工程师的必备工具。",ask:"W&B 和 MLflow 在大规模训练中如何使用？"},
      {name:"Eval / Benchmark",tag:"模型评估",detail:"评估体系分两类：<b>自动化 benchmark</b>（MMLU、HumanEval、GSM8K 等标准集）和<b>人类评估</b>（Chatbot Arena 的 ELO 排名）。推理优化后必须跑 eval 确认精度无损。",ask:"量化后如何用 benchmark 验证精度损失？"},
      {name:"Data pipeline",tag:"数据处理",detail:"预训练数据处理流程：<b>爬取 → 语言检测 → 质量过滤 → 去重（MinHash）→ 有害内容过滤 → 分词</b>。数据质量对模型能力的影响远大于架构调整。",ask:"预训练数据去重的 MinHash 算法原理是什么？"},
      {name:"K8s GPU 调度",tag:"集群资源管理",detail:"用 Kubernetes + Volcano/Kueue 管理 GPU 集群，支持 <b>Gang Scheduling（同时调度一组 pod）</b>避免死锁，结合节点亲和性规则减少跨机通信。",ask:"GPU 集群的 Gang Scheduling 是如何避免训练死锁的？"},
    ]
  },
  {
    color:"#888780", label:"L5", title:"硬件层",
    en:"Hardware",
    desc:"AI Infra 的物理基础。不需要设计芯片，但必须理解硬件规格如何影响算法选择——比如 HBM 带宽决定了 memory-bound 操作的上限，NVLink 带宽决定了 TP 的通信开销。",
    modules:[
      {name:"NVIDIA H100 / A100",tag:"主流训练推理 GPU",detail:"H100：<b>80GB HBM3，3.35 TB/s 带宽</b>，FP8 Tensor Core 达 3958 TFLOPS，NVLink 4.0 互联。A100 是上一代主力。两者都支持 MIG（多实例 GPU）用于推理部署。",ask:"H100 和 A100 在 LLM 推理场景下性能差距有多大？"},
      {name:"NVLink / NVSwitch",tag:"GPU 间高速互联",detail:"NVLink 4.0 单 GPU 双向带宽 900 GB/s，远超 PCIe 的 64 GB/s。<b>NVSwitch</b> 让 8 块 GPU 全互联，所有 GPU 对可同时以全速通信，是 Tensor Parallelism 高效的硬件基础。",ask:"NVLink 和 InfiniBand 在分布式训练中分别负责什么？"},
      {name:"HBM 与 Roofline",tag:"显存带宽分析",detail:"<b>HBM（High Bandwidth Memory）</b>是 GPU 的高速显存。Roofline 模型用于判断计算是 <b>compute-bound（算力瓶颈）</b>还是 <b>memory-bound（带宽瓶颈）</b>，指导算子优化方向。",ask:"如何用 Roofline 模型分析一个算子是否 memory-bound？"},
      {name:"InfiniBand / RDMA",tag:"跨节点网络",detail:"多机训练时，NVLink 只能连接单节点内的 GPU，跨节点需要 <b>InfiniBand（IB）</b>网络。RDMA 技术让 GPU 间直接传输数据绕过 CPU，200 Gb/s HDR IB 是当前主流。",ask:"InfiniBand RDMA 在分布式训练中如何减少通信延迟？"},
      {name:"Google TPU",tag:"Google 专用 AI 芯片",detail:"矩阵乘法单元（MXU）针对 GEMM 深度优化，TPU Pod 通过专属高速互联组网。Google 内部训练 Gemini 系列使用 TPU v5p，但对外 API 访问，不开放裸机。",ask:"TPU 和 GPU 在 LLM 训练上的架构差异是什么？"},
      {name:"国产 AI 芯片",tag:"昇腾 / 燧原 / 沐曦",detail:"<b>华为昇腾 910B</b> 是国内最成熟方案，基于 CANN 软件栈，支持 PyTorch 适配层。<b>燧原 GCU</b>、<b>沐曦 GPU</b> 也在快速迭代。国产芯片生态和 CUDA 仍有差距，但受制裁背景下需求强劲。",ask:"华为昇腾 910B 和 NVIDIA A100 的性能对比如何？"},
    ]
  }
];

let openLayer = null;
let openMod = null;

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  layers.forEach((layer, li) => {
    const isLayerOpen = openLayer === li;
    const card = document.createElement('div');
    card.className = 'layer-card';

    const header = document.createElement('div');
    header.className = 'layer-header';
    header.innerHTML = `
      <div class="layer-dot" style="background:${layer.color}"></div>
      <div style="flex:1">
        <div class="layer-title">${layer.title} <span style="font-weight:400;font-size:13px;color:var(--color-text-tertiary)">${layer.en}</span></div>
      </div>
      <i class="ti ti-chevron-down layer-chevron${isLayerOpen?' open':''}"></i>
    `;
    header.onclick = () => {
      openLayer = isLayerOpen ? null : li;
      openMod = null;
      render();
    };

    const body = document.createElement('div');
    body.className = 'layer-body' + (isLayerOpen ? ' open' : '');

    const desc = document.createElement('div');
    desc.className = 'layer-desc';
    desc.style.paddingBottom = '12px';
    desc.textContent = layer.desc;
    body.appendChild(desc);

    const grid = document.createElement('div');
    grid.className = 'module-grid';

    layer.modules.forEach((mod, mi) => {
      const key = `${li}-${mi}`;
      const mc = document.createElement('div');
      mc.className = 'mod-card';
      mc.innerHTML = `<div class="mod-name">${mod.name}</div><div class="mod-tag">${mod.tag}</div>`;
      mc.onclick = () => {
        openMod = openMod === key ? null : key;
        render();
      };
      grid.appendChild(mc);

      if(openMod === key){
        const det = document.createElement('div');
        det.className = 'detail-panel open';
        det.innerHTML = `
          <div class="det-title">${mod.name}</div>
          <div class="det-body">${mod.detail}</div>
          <button class="ask-btn" onclick="sendPrompt('${mod.ask}')">深入了解 ↗</button>
        `;
        grid.appendChild(det);
      }
    });

    body.appendChild(grid);
    card.appendChild(header);
    card.appendChild(body);
    app.appendChild(card);
  });
}

render();
</script>
