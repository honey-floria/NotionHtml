
<h2 class="sr-only">大小油瓶问题互动演示：拖动滑块调整大瓶数量，观察条件是否同时满足</h2>

<div style="padding: 1rem 0;">

<div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
  <label style="font-size:14px; color:var(--color-text-secondary); white-space:nowrap;">大瓶数量</label>
  <input type="range" min="0" max="50" value="20" id="bigSlider" step="1" style="flex:1;" oninput="update(this.value)"/>
  <span style="font-size:15px; font-weight:500; min-width:32px; text-align:right;" id="bigOut">20</span>
</div>

<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-bottom:1.5rem;">
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:1rem; text-align:center;">
    <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">大瓶</div>
    <div style="font-size:22px; font-weight:500;" id="bigCount">20 个</div>
    <div style="font-size:12px; color:var(--color-text-secondary); margin-top:4px;" id="bigKg">共 80 千克</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:1rem; text-align:center;">
    <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">小瓶</div>
    <div style="font-size:22px; font-weight:500;" id="smallCount">30 个</div>
    <div style="font-size:12px; color:var(--color-text-secondary); margin-top:4px;" id="smallKg">共 60 千克</div>
  </div>
  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:1rem; text-align:center;">
    <div style="font-size:12px; color:var(--color-text-secondary); margin-bottom:4px;">大瓶多装</div>
    <div style="font-size:22px; font-weight:500;" id="diff">20 千克</div>
    <div style="font-size:12px; color:var(--color-text-secondary); margin-top:4px;">目标：20 千克</div>
  </div>
</div>

<div id="statusBox" style="border-radius:var(--border-radius-md); padding:0.75rem 1rem; font-size:14px; font-weight:500; text-align:center; border:0.5px solid; transition: background 0.2s;">
</div>

<div style="margin-top:1.5rem; font-size:13px; color:var(--color-text-secondary); line-height:1.6;">
  <span style="font-weight:500; color:var(--color-text-primary);">方程思路：</span>
  设大瓶 x 个，小瓶 (50−x) 个<br>
  条件：4x − 2×(50−x) = 20 → 解得 x = <span style="font-weight:500; color:var(--color-text-primary);">20</span>
</div>
</div>

<script>
function update(val) {
  val = parseInt(val);
  const big = val;
  const small = 50 - val;
  const bigKg = big * 4;
  const smallKg = small * 2;
  const diff = bigKg - smallKg;

  document.getElementById('bigOut').textContent = val;
  document.getElementById('bigCount').textContent = big + ' 个';
  document.getElementById('bigKg').textContent = '共 ' + bigKg + ' 千克';
  document.getElementById('smallCount').textContent = small + ' 个';
  document.getElementById('smallKg').textContent = '共 ' + smallKg + ' 千克';
  document.getElementById('diff').textContent = diff + ' 千克';

  const box = document.getElementById('statusBox');
  const c1 = big + small === 50;
  const c2 = diff === 20;
  if (c1 && c2) {
    box.textContent = '✓ 两个条件都满足！答案正确：大瓶 ' + big + ' 个，小瓶 ' + small + ' 个';
    box.style.background = 'var(--color-background-success)';
    box.style.color = 'var(--color-text-success)';
    box.style.borderColor = 'var(--color-border-success)';
  } else {
    const msgs = [];
    if (!c1) msgs.push('总数不等于50');
    if (!c2) msgs.push('差值为 ' + diff + ' 千克，需要恰好 20 千克');
    box.textContent = '✗ 条件不满足：' + msgs.join('；');
    box.style.background = 'var(--color-background-danger)';
    box.style.color = 'var(--color-text-danger)';
    box.style.borderColor = 'var(--color-border-danger)';
  }
}
update(20);
</script>
